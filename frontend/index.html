<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>健身陪练智能体</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    * { box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, ''Segoe UI'', Roboto, sans-serif; }
    .hidden { display: none !important; }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #1f2937; }
    ::-webkit-scrollbar-thumb { background: #4b5563; border-radius: 3px; }
    .sidebar { transition: transform 0.3s ease; }
    @media (max-width: 768px) {
      .sidebar { transform: translateX(-100%); position: fixed; z-index: 50; height: 100vh; }
      .sidebar.open { transform: translateX(0); }
    }
    .nav-btn { transition: all 0.2s; }
    .nav-btn.active { background: #374151; border-left: 3px solid #3b82f6; color: #60a5fa; }
    .msg-enter { animation: slideUp 0.3s ease-out; }
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .typing-dots span {
      animation: blink 1.4s infinite;
      display: inline-block; width: 6px; height: 6px;
      border-radius: 50%; background: #9ca3af; margin: 0 2px;
    }
    .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
    .typing-dots span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes blink {
      0%, 60%, 100% { opacity: 0.2; transform: scale(1); }
      30% { opacity: 1; transform: scale(1.3); }
    }
    .glow { box-shadow: 0 0 15px rgba(59,130,246,0.3); }
    .progress-bar { transition: width 0.5s ease; }
  </style>
</head>
<body class="bg-gray-900 text-gray-100 h-screen flex overflow-hidden">

  <!-- 移动端菜单按钮 -->
  <button id="menu-toggle" class="md:hidden fixed top-3 left-3 z-50 bg-gray-800 p-2 rounded-lg">
    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
    </svg>
  </button>

  <!-- 侧边栏 -->
  <aside id="sidebar" class="sidebar w-64 bg-gray-800 flex flex-col flex-shrink-0 border-r border-gray-700">
    <!-- 标题区 -->
    <div class="p-4 border-b border-gray-700">
      <h1 class="text-lg font-bold text-blue-400">🏋️ 健身陪练</h1>
      <p class="text-xs text-gray-500 mt-1">长时记忆智能体</p>
      <div class="mt-3">
        <label class="text-xs text-gray-400">用户 ID</label>
        <input id="user-id-input" value="u_001"
               class="w-full bg-gray-700 rounded-lg px-3 py-1.5 text-sm text-white mt-1 border border-gray-600 focus:border-blue-500 focus:outline-none" />
      </div>
      <div id="connection-status" class="text-xs mt-2 text-gray-400">检测中...</div>
    </div>

    <!-- 导航 -->
    <nav class="flex-1 py-2">
      <button id="nav-chat" class="nav-btn active w-full text-left px-4 py-2.5 text-sm flex items-center gap-2">
        <span>💬</span> 对话
      </button>
      <button id="nav-onboarding" class="nav-btn w-full text-left px-4 py-2.5 text-sm flex items-center gap-2">
        <span>📝</span> 画像导入
      </button>
      <button id="nav-profile" class="nav-btn w-full text-left px-4 py-2.5 text-sm flex items-center gap-2">
        <span>👤</span> 用户画像
      </button>
      <button id="nav-memory" class="nav-btn w-full text-left px-4 py-2.5 text-sm flex items-center gap-2">
        <span>🧠</span> 长期记忆
      </button>
    </nav>

    <!-- 模型参数面板 -->
    <div class="border-t border-gray-700">
      <button id="model-panel-toggle" class="w-full text-left px-4 py-2 text-xs text-gray-400 hover:text-gray-200 flex items-center gap-2">
        <span>▼</span> ⚙️ 模型参数
      </button>
      <div id="model-panel" class="px-4 pb-3">
        <div id="model-params-display" class="space-y-0.5 mb-2"></div>
        <div class="flex items-center justify-between pt-2 border-t border-gray-700">
          <span class="text-xs text-gray-400">启用 LLM (GLM-4)</span>
          <label class="relative inline-flex items-center cursor-pointer">
            <input id="llm-toggle" type="checkbox" class="sr-only peer" />
            <div class="w-9 h-5 bg-gray-600 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full rtl:peer-checked:after:-translate-x-full peer-checked:after:border-white after:content-[''''] after:absolute after:top-[2px] after:start-[2px] after:bg-white after:rounded-full after:h-4 after:w-4 after:transition-all peer-checked:bg-blue-600"></div>
          </label>
        </div>
      </div>
    </div>
  </aside>

  <!-- 主内容区 -->
  <main class="flex-1 flex flex-col overflow-hidden">

    <!-- ====== 对话视图 ====== -->
    <section id="view-chat" class="view flex flex-col h-full">
      <div id="chat-messages" class="flex-1 overflow-y-auto p-4 space-y-1">
        <div class="text-center text-gray-500 mt-16">
          <p class="text-5xl mb-4">🏋️</p>
          <p class="text-lg font-medium">欢迎使用健身陪练智能体</p>
          <p class="text-sm mt-2 text-gray-600">输入你的训练目标、偏好或身体情况，我会记住你的一切</p>
        </div>
      </div>
      <!-- Agent 追问横幅 -->
      <div id="onboarding-banner" class="hidden mx-4 mb-1 bg-gradient-to-r from-blue-900/50 to-purple-900/50 border border-blue-700/50 rounded-xl p-3">
        <div class="flex items-start justify-between">
          <div class="flex-1">
            <h4 id="banner-title" class="text-sm font-bold text-blue-300"></h4>
            <p id="banner-reason" class="text-xs text-gray-400 mt-0.5"></p>
            <div id="banner-questions" class="mt-2 space-y-1"></div>
          </div>
          <button id="dismiss-banner" class="text-gray-500 hover:text-gray-300 text-lg leading-none ml-2">×</button>
        </div>
      </div>
      <div class="p-4 border-t border-gray-700">
        <div class="flex gap-2">
          <textarea id="chat-input" rows="1"
            placeholder="说说你的情况... (如: 我想减脂，膝盖不太舒服)"
            class="flex-1 bg-gray-700 rounded-xl px-4 py-3 text-sm text-white resize-none focus:outline-none focus:ring-2 focus:ring-blue-500"
            style="max-height: 120px;"></textarea>
          <button id="send-btn"
            class="bg-blue-600 hover:bg-blue-700 text-white rounded-xl px-5 transition-colors flex items-center justify-center">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"/></svg>
          </button>
          <button id="stop-stream-btn"
            class="hidden bg-red-600 hover:bg-red-700 text-white rounded-xl px-4 transition-colors text-sm">
            ■ 停止
          </button>
        </div>
      </div>
    </section>

    <!-- ====== 画像导入视图 ====== -->
    <section id="view-onboarding" class="view hidden h-full overflow-y-auto">
      <div class="max-w-2xl mx-auto p-6">
        <div class="flex items-center justify-between mb-4">
          <h2 class="text-xl font-bold">📝 画像导入</h2>
          <span id="step-indicator" class="text-sm text-gray-400">1/3</span>
        </div>
        <!-- 进度条 -->
        <div class="w-full bg-gray-700 rounded-full h-2 mb-6">
          <div id="onboarding-progress" class="progress-bar bg-gradient-to-r from-blue-500 to-purple-500 h-2 rounded-full" style="width: 33%"></div>
        </div>
        <!-- 步骤内容 -->
        <div id="onboarding-content" class="bg-gray-800 rounded-2xl p-6 mb-4"></div>
        <!-- 按钮 -->
        <div class="flex justify-between">
          <button id="onboarding-prev" class="hidden bg-gray-700 hover:bg-gray-600 text-white rounded-lg px-6 py-2.5 text-sm transition-colors">← 上一步</button>
          <button id="onboarding-next" class="bg-blue-600 hover:bg-blue-700 text-white rounded-lg px-6 py-2.5 text-sm transition-colors ml-auto">下一步 →</button>
          <button id="onboarding-submit" class="hidden bg-gradient-to-r from-green-500 to-emerald-600 hover:from-green-600 hover:to-emerald-700 text-white font-bold rounded-lg px-8 py-2.5 text-sm transition-all glow ml-auto">✅ 提交并生成我的初计划</button>
        </div>
        <button id="onboarding-skip" class="w-full mt-4 text-gray-500 hover:text-gray-300 text-xs text-center">跳过，稍后再说</button>
      </div>
    </section>

    <!-- ====== 用户画像视图 ====== -->
    <section id="view-profile" class="view hidden h-full overflow-y-auto p-6">
      <div class="max-w-3xl mx-auto">
        <div class="flex items-center justify-between mb-6">
          <h2 class="text-xl font-bold">👤 用户画像</h2>
          <button id="refresh-profile-btn" class="text-sm bg-gray-700 hover:bg-gray-600 text-white rounded-lg px-3 py-1.5 transition-colors">刷新</button>
        </div>
        <div class="grid md:grid-cols-2 gap-6">
          <div>
            <h3 class="text-sm font-medium text-gray-400 mb-3">当前 Profile</h3>
            <div id="profile-display" class="bg-gray-800 rounded-xl p-4 max-h-96 overflow-y-auto"></div>
          </div>
          <div>
            <div id="profile-edit" class="bg-gray-800 rounded-xl p-4"></div>
          </div>
        </div>
      </div>
    </section>

    <!-- ====== 长期记忆视图 ====== -->
    <section id="view-memory" class="view hidden h-full overflow-y-auto p-6">
      <div class="max-w-3xl mx-auto">
        <div class="flex items-center justify-between mb-4">
          <h2 class="text-xl font-bold">🧠 长期记忆</h2>
          <div class="flex items-center gap-2">
            <span id="memory-count" class="text-xs text-gray-400"></span>
            <button id="new-memory-btn" class="text-sm bg-blue-600 hover:bg-blue-700 text-white rounded-lg px-3 py-1.5 transition-colors">+ 新增</button>
            <button id="refresh-memory-btn" class="text-sm bg-gray-700 hover:bg-gray-600 text-white rounded-lg px-3 py-1.5 transition-colors">刷新</button>
          </div>
        </div>

        <!-- 新增记忆面板 -->
        <div id="memory-new-panel" class="hidden bg-gray-800 rounded-xl p-4 mb-4">
          <textarea id="new-memory-text" class="w-full bg-gray-700 rounded-lg px-3 py-2 text-sm text-white mb-2" rows="3" placeholder="输入记忆内容..."></textarea>
          <button id="save-new-memory" class="bg-green-600 hover:bg-green-700 text-white rounded-lg px-4 py-1.5 text-sm transition-colors">保存</button>
        </div>

        <!-- 编辑记忆面板 -->
        <div id="memory-edit-panel" class="hidden bg-gray-800 rounded-xl p-4 mb-4">
          <p class="text-xs text-gray-400 mb-2">编辑记忆 <span id="edit-memory-id-display" class="font-mono text-blue-400"></span></p>
          <textarea id="edit-memory-text" class="w-full bg-gray-700 rounded-lg px-3 py-2 text-sm text-white mb-2" rows="3"></textarea>
          <div class="flex gap-2">
            <button id="save-edit-memory" class="bg-green-600 hover:bg-green-700 text-white rounded-lg px-4 py-1.5 text-sm transition-colors">保存</button>
            <button id="cancel-edit-memory" class="bg-gray-600 hover:bg-gray-500 text-white rounded-lg px-4 py-1.5 text-sm transition-colors">取消</button>
          </div>
        </div>

        <!-- 记忆列表 -->
        <div id="memory-list" class="space-y-2"></div>

        <!-- 分页 -->
        <div class="flex justify-center gap-4 mt-4">
          <button id="mem-prev" class="text-sm bg-gray-700 hover:bg-gray-600 text-white rounded-lg px-4 py-1.5 transition-colors disabled:opacity-50" disabled>← 上一页</button>
          <button id="mem-next" class="text-sm bg-gray-700 hover:bg-gray-600 text-white rounded-lg px-4 py-1.5 transition-colors">下一页 →</button>
        </div>
      </div>
    </section>

  </main>

  <!-- 移动端遮罩 -->
  <div id="sidebar-overlay" class="hidden fixed inset-0 bg-black/50 z-40 md:hidden"></div>

  <script type="module" src="/static/js/app.js"></script>
</body>
</html>
